name: Gitleaks Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Gitleaks can scan all commits

      # The previous step hand-rolled a curl install via the GitHub releases API,
      # which is prone to rate-limiting/404s on an unauthenticated CI runner.
      # The maintained action handles the binary itself, no curl pipeline needed.
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
